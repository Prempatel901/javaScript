        #parent{

            position: relative;
            height: 400px;
            width: 400px;

        input{
            padding: 15px 20px;

        button{
            margin: 30px 0 ;

    </style>
</head>
<body>
    <div id="parent">
        <h1>Income Tax Calculator</h1>
        <form>
            <label for="income"></label>
            <input type="number" id="income" name="income">
            <br>
            <button type="submit"> Calculate income</button>
            <button type="reset">Reset</button>
        </form>

        <h2>Total Tax:- </h2>
    </div>
</body>
<script>

    const form  =  document.querySelector("form")
   
    form.addEventListener("submit",(e)=>{
        e.preventDefault()

        const income = document.querySelector("#income")
        const amount = parseInt(income.value)

        const result = document.querySelector("h2")
        let totalTax = 0;
        if(amount <= 1200000)
            totalTax = 0;
        else if(amount <= 1600000)
            totalTax = (amount - 1200000)*0.15;
        else if(amount <= 2000000)
            totalTax = (amount - 1600000)*0.20 +60000;
        else if(amount <= 2400000)
            totalTax = (amount - 2000000)*0.25 +60000 + 80000;
        else
            totalTax = (amount - 2400000)*0.30 + 60000 +80000 +100000

        result.textContent = `Total Tax:- ${totalTax}`
      
        // form.reset()
    })
        form.addEventListener('reset',()=>{
            form.reset()
            document.querySelector("h2").textContent = `total Tax:- `
        })



</script>
</html>
