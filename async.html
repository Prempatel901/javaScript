<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
            padding: 0px;
            margin: 0;
        }
        body{
            height: 100vh;
            background-color: black;
            color: white;
        }
        h1{
            text-align: center;
            font-size: 30px;
            margin-top: 20px;
            margin-bottom: 20px;

        }
        #card{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            width: 80%;
            margin: auto;
            gap: 20px;
        }
        .user{
            width: 200px;
            text-align: center; 
            padding: 10px;
            border: 2px solid white;
            border-radius: 5px;
            transition: transform 0.3s ease-in;
        }

        .user:hover{
            transform: scale(1.1);
        }


        img{
            width: 170px;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
        }
        h2{
            font-size: 20px;
        }
        a{
            text-decoration: none;
            color: orange;
        }
    </style>
</head>
<body>
    <h1>Github User</h1>
    <div id="card">

    </div>
</body>
<script src="async.js"></script>
</html>
