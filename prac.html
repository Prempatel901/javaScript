

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #box{
            margin-bottom: 20px;
        }
        button{
            padding: 10px 30px;
            border: 2px solid rgb(164, 44, 175);
            background-color: rebeccapurple;
            color: white;
            border-radius: 12px;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div id="box" style="width: 400px; height: 400px; border: 2px solid black;">

    </div>
    <div>
        <button id="btn">Start</button>
    <button id="btn1">Stop</button>
    </div>
</body>
<script>
    const box = document.getElementById("box")
    const btn = document.getElementById("btn")
    const stop = document.getElementById("btn1")

    let interval 

    btn.addEventListener("click", () => {
        clearInterval(interval)
      interval = setInterval(()=>{
          let color =  Math.floor(Math.random()*255)
        let color1 =  Math.floor(Math.random()*255)
        let color2 =  Math.floor(Math.random()*255)
        box.style.backgroundColor = `rgb(${color},${color1},${color2})`
        console.log(color, color1, color2)
      },1000)
    })

    stop.addEventListener("click",()=>{
        clearInterval(interval)
    })

</script>

</html>
