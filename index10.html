<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
    <style>
        body{
            height: 100vh;
            background-color: black;
            color: white;
            position: relative;
        }
        .circle{
            height: 50px;
            width: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            animation: grow 5s forwards;
            position: absolute;
        }

        @keyframes grow{
            0%{
                transform: scale(1);
                opacity: 1;
                font-size: 10px;
            }
            100%{
                transform: scale(3);
                opacity: 0;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    
</body>
<script>

    const body = document.querySelector('body')
    body.addEventListener('click',(e)=>{
        console.log(e.clientX,e.clientY)

       const circleEle =  document.createElement('div')
       circleEle.classList.add('circle')
       circleEle.textContent = 'vasu'

    //    const color = ['❤️','💖','✨','🌸','💝','🤍'];
       const color = ['red','blue','orange','green','pink','purple'];
       circleEle.style.backgroundColor = color[Math.floor(Math.random()*6)];

       circleEle.style.top = `${e.clientY-25}px`;
       circleEle.style.left = `${e.clientX-25}px`;


       body.append(circleEle)
       
       setTimeout(()=>{
        circleEle.remove()
       },5000)
    })





</script>
</html>
