<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            color: white;
            padding: 0px;
            box-sizing: border-box;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="time" style="font-size: 50px;"></div>
</body>
<script>
     const div = document.getElementById("time")
    setInterval(()=>{
    let time = new Date()
    div.textContent = time.toLocaleTimeString()
    },1000)
 
</script>
</html>
