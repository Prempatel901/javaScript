const btn = document.querySelector("button")
const box =  document.getElementById("box")
    let value = false
btn.addEventListener("click",()=>{
    if(!value){
        box.style.display = "none"
        btn.textContent= "Show"
        value = true
    }else{
        btn.textContent= "Hide"
        box.style.display = "block"
        value = false
        
    }
})
